name: Build Android app (AAB)

# Manual trigger. Run it from the repo's "Actions" tab AFTER you have:
#   1. Set server.url in capacitor.config.ts to your Railway production URL.
#   2. Added these repository secrets (Settings → Secrets → Actions):
#        ANDROID_KEYSTORE_BASE64   — base64 of your release keystore file
#        ANDROID_KEYSTORE_PASSWORD — keystore password
#        ANDROID_KEY_ALIAS         — key alias
#        ANDROID_KEY_PASSWORD      — key password
# The job outputs a signed AAB artifact you download and upload to Play Console.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build signed release AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: swish-menu-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
